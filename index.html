<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한마음교회 물품 바자회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1f2937; }
        .loading-spinner { border: 4px solid #e5e7eb; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .chip-active { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black text-blue-600 flex items-center gap-2">
                <span>⛪</span> 한마음 CAROTE
            </h1>
            <a href="https://open.kakao.com/o/gaBbnCpi" target="_blank" 
               class="bg-[#FEE500] text-[#3C1E1E] px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow hover:bg-[#FADA00] transition-all flex items-center gap-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" class="w-4 h-4" alt="K">
                기부/문의
            </a>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-5 mt-8">
        <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-2xl md:text-3xl font-black mb-2">사랑나눔 헌금 현황</h2>
                <div class="flex items-baseline gap-2 mb-6">
                    <span id="progressText" class="text-4xl font-black">€0</span>
                    <span class="text-blue-200 text-sm font-bold">/ 목표 €5,000</span>
                </div>
                <div class="w-full bg-blue-900/40 rounded-full h-4 overflow-hidden border border-blue-500/30">
                    <div id="progressBar" class="bg-gradient-to-r from-green-300 to-emerald-400 h-full transition-all duration-1000" style="width: 65%;"></div>
                </div>
                <p class="mt-4 text-xs text-blue-100 font-medium opacity-80">※ 후원금은 선교팀 활동을 위해 사용됩니다.</p>
            </div>
            <span class="absolute -right-10 -bottom-10 text-[150px] opacity-10 rotate-12">🎁</span>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-5 py-12">
        <div id="loading" class="flex flex-col items-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-400 font-medium">물품 목록을 동기화 중...</p>
        </div>

        <div id="content" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h3 class="text-xl font-bold text-gray-800">나눔 물품 목록</h3>
                <div id="filterGroup" class="flex flex-wrap gap-2">
                    </div>
            </div>

            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                </div>
        </div>
    </main>

    <script>
        // 고정 주소
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPlta6Z0joNP1yli805VHoF5oLLunjMBB6CA7kz9OZ8IdA_HMCjt0KrLM0mXXVCViK2pVDmg-9NDPI/pub?output=csv";
        const CHAT_URL = "https://open.kakao.com/o/gaBbnCpi";
        
        let allProducts = [];
        let currentFilter = '전체';

        async function loadData() {
            try {
                // 캐시 방지를 위해 랜덤 쿼리 추가
                const response = await fetch(CSV_URL + "&t=" + Date.now());
                const text = await response.text();
                
                // 줄바꿈 문자를 통일하여 분리
                const rows = text.replace(/\r/g, '').split('\n').filter(row => row.trim() !== "");
                if (rows.length < 1) throw new Error("데이터가 없습니다.");

                const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                
                allProducts = rows.slice(1).map(row => {
                    const values = row.split(',').map(v => v.trim());
                    let obj = {};
                    headers.forEach((header, i) => {
                        obj[header] = values[i] || "";
                    });
                    return obj;
                }).filter(p => p.name); // 이름이 있는 것만

                renderFilters();
                renderItems(allProducts);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">불러오기 실패: ${err.message}</p>`;
            }
        }

        function renderFilters() {
            const categories = ['전체', ...new Set(allProducts.map(p => p.category).filter(c => c))];
            const group = document.getElementById('filterGroup');
            group.innerHTML = categories.map(c => `
                <button onclick="applyFilter('${c}')" class="px-4 py-1.5 rounded-full text-xs font-bold border-2 transition-all ${c === currentFilter ? 'chip-active' : 'bg-white border-gray-100 text-gray-500 hover:border-blue-200'}">
                    ${c}
                </button>
            `).join('');
        }

        function renderItems(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-gray-50 flex flex-col h-full group">
                    <div class="aspect-[4/3] bg-gray-100 overflow-hidden relative">
                        <img src="${p.img || 'https://via.placeholder.com/400x300?text=No+Image'}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                             onerror="this.src='https://via.placeholder.com/400x300?text=Image+Error'">
                        <div class="absolute top-3 left-3 flex gap-1">
                            <span class="text-[9px] font-black bg-blue-600 text-white px-2 py-1 rounded-md uppercase tracking-tighter">${p.category}</span>
                            <span class="text-[9px] font-black ${getStatusColor(p.status)} text-white px-2 py-1 rounded-md uppercase tracking-tighter">${p.status}</span>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h4 class="font-bold text-lg text-gray-800 mb-1 line-clamp-1">${p.name}</h4>
                        <p class="text-xs text-gray-400 line-clamp-2 mb-4 leading-relaxed">${p.desc || "상세 설명이 없습니다."}</p>
                        <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center">
                            <span class="text-xl font-black text-blue-600">$${p.price}</span>
                            <button onclick="reserve('${p.name}', '${p.price}', '${p.status}')" 
                                    class="bg-gray-900 text-white px-4 py-2 rounded-xl font-bold text-xs hover:bg-blue-600 transition-all active:scale-95">
                                예약하기
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(s) {
            if(s === '판매중') return 'bg-green-500';
            if(s === '예약중') return 'bg-orange-400';
            return 'bg-gray-400';
        }

        function applyFilter(cat) {
            currentFilter = cat;
            const filtered = cat === '전체' ? allProducts : allProducts.filter(p => p.category === cat);
            renderItems(filtered);
            renderFilters();
        }

        function reserve(name, price, status) {
            if (status !== '판매중') { alert('이미 예약되었거나 완료된 물품입니다.'); return; }
            const msg = `[바자회 예약] '${name}' ($${price}) 구매 예약 원합니다.`;
            navigator.clipboard.writeText(msg).then(() => {
                if (confirm(`🎉 예약을 진행하시겠습니까?\n\n"${msg}"\n문구가 복사되었습니다. 카톡창에 붙여넣어 주세요.`)) {
                    window.open(CHAT_URL, '_blank');
                }
            });
        }

        loadData();
    </script>
</body>
</html>
